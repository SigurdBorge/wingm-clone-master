    <style>
      /* THE GLOBAL ERASER: Hides any element mentioning Lovable before it even renders */
      .lovable-badge, 
      [class*="lovable"], 
      [id*="lovable"],
      a[href*="lovable.dev"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        height: 0 !important;
        width: 0 !important;
        position: absolute !important;
        left: -9999px !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function() {
        const cleanup = () => {
          document.querySelectorAll('a').forEach(link => {
            if (link.href.includes('lovable.dev') || link.innerText.includes('Lovable')) {
              link.remove();
            }
          });
          const badge = document.querySelector('.lovable-badge') || document.querySelector('[class*="lovable"]');
          if (badge) badge.remove();
        };
        // Run immediately
        cleanup();
        // Run every half second for 5 seconds to catch delayed loading
        let count = 0;
        const interval = setInterval(() => {
          cleanup();
          count++;
          if (count > 10) clearInterval(interval);
        }, 500);
      })();
    </script>
  </body>
